name: RDP

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Sunucu Verisini Geri Yukle
        uses: actions/download-artifact@v4
        with:
          name: server-backup
          path: C:\server-data
        continue-on-error: true

      - name: Temel RDP Ayarlarini Yapilandir
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="BlueMap-Web" dir=in action=allow protocol=TCP localport=8100

          Restart-Service -Name TermService -Force
          Write-Host "RDP ayarlari tamamlandi."

      - name: RDP Kullanicisi Olustur
        run: |
          $password = "97ymHPc7k4tM"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_CREDS=Kullanici: RDP | Sifre: $password" >> $env:GITHUB_ENV
          Write-Host "RDP kullanicisi olusturuldu."

      - name: Tailscale Kur
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Write-Host "Tailscale indiriliyor..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Write-Host "Tailscale kuruldu."

          Stop-Service -Name "Tailscale" -Force

          $savedState = "C:\server-data\ts-state"
          if (Test-Path $savedState) {
              Write-Host "Kayitli Tailscale durumu yukleniyor..."
              Copy-Item -Path "$savedState\*" -Destination "C:\ProgramData\Tailscale" -Recurse -Force
          }

          Start-Service -Name "Tailscale"
          Remove-Item $installerPath -Force

      - name: Tailscale Baglantisi Kur ve IP.json Olustur
        run: |
          Write-Host "Tailscale baglantisi kuruluyor..."
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp-server

          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Host "HATA: Tailscale IP alinamadi, cikiliyor."
              exit 1
          }
          Write-Host "Tailscale IP: $tsIP"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

          $serverDir = "C:\server-data"
          if (-not (Test-Path $serverDir)) { New-Item -ItemType Directory -Force -Path $serverDir }

          $jsonContent = @{
              TailscaleIP   = $tsIP;
              Hostname      = "gh-rdp-server";
              SonGuncelleme = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json

          Set-Content -Path "$serverDir\ip.json" -Value $jsonContent
          Write-Host "ip.json dosyasi olusturuldu."

      - name: Chrome Varsayilan Tarayici Yap ve Antigravity Indir
        run: |
          # --- Chrome'u varsayilan tarayici olarak ayarla ---
          Write-Host "Chrome varsayilan tarayici yapiliyor..."

          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (-not (Test-Path $chromePath)) {
              $chromePath = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe"
          }

          if (Test-Path $chromePath) {
              Start-Process $chromePath -ArgumentList "--make-default-browser" -Wait -ErrorAction SilentlyContinue
              
              # Tıklanan linklerin Edge yerine Chrome ile açılmasını zorlamak için HTTP/HTTPS protokollerini kayit defterinden değiştiriyoruz
              $cmd = "`"$chromePath`" -- `"%1`""
              New-Item -Path "HKLM:\SOFTWARE\Classes\http\shell\open\command" -Force | Out-Null
              Set-ItemProperty -Path "HKLM:\SOFTWARE\Classes\http\shell\open\command" -Name "(default)" -Value $cmd -Force
              New-Item -Path "HKLM:\SOFTWARE\Classes\https\shell\open\command" -Force | Out-Null
              Set-ItemProperty -Path "HKLM:\SOFTWARE\Classes\https\shell\open\command" -Name "(default)" -Value $cmd -Force
              
              Write-Host "Chrome varsayilan tarayici olarak ayarlandi ve link yonlendirmeleri tamamlandi."
          } else {
              Write-Host "UYARI: Chrome bulunamadi, varsayilan tarayici ayarlanamadi."
          }

          # --- Antigravity indir ve kur ---
          Write-Host "Antigravity indiriliyor..."
          
          try {
              # Google'in statik linkleri sık sık zaman asimina ugradigi icin en garanti yontem olan Chocolatey ile kuruyoruz
              choco install antigravity -y --no-progress
              Write-Host "Antigravity indirildi ve otomatik olarak kuruldu."

              # Kurulum sonrasi uygulamayi baslat (RDP ile baglaninca ekranda acik olmasi icin)
              $agPaths = @(
                  "$env:LOCALAPPDATA\Programs\Antigravity\Antigravity.exe",
                  "C:\Program Files\Antigravity\Antigravity.exe",
                  "C:\Program Files (x86)\Antigravity\Antigravity.exe"
              )
              foreach ($p in $agPaths) {
                  if (Test-Path $p) {
                      Start-Process $p -ErrorAction SilentlyContinue
                      Write-Host "Antigravity baslatildi. RDP ile baglaninca hazir olacak."
                      break
                  }
              }
          } catch {
              Write-Host "UYARI: Antigravity Chocolatey ile kurulamadi. Hata: $_"
              Write-Host "Manuel indirme linki: https://antigravity.google/download"
          }

      - name: Baglanti Dongusu
        run: |
          Write-Host "=========================================="
          Write-Host "TAILSCALE IP  : $env:TAILSCALE_IP"
          Write-Host "KULLANICI ADI : RDP"
          Write-Host "SIFRE         : 97ymHPc7k4tM"
          Write-Host "=========================================="

          # 5 saat 40 dakika = 20400 saniye (5 * 3600 + 40 * 60)
          $timeout  = 20400
          $interval = 300
          $elapsed  = 0
          
          while ($elapsed -lt $timeout) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP Aktif... Kalan sure: $(($timeout - $elapsed) / 60) dakika."
              Start-Sleep -Seconds $interval
              $elapsed += $interval
          }
          Write-Host "Zaman asimi (5 saat 40 dakika) doldu, is akisi sonlandiriliyor."

      - name: Dosya Kilitlerini Kaldir ve Veriyi Kaydet
        if: always()
        run: |
          Write-Host "Islemler kapatiliyor..."
          Stop-Process -Name "java"       -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "tailscale*" -Force -ErrorAction SilentlyContinue
          Stop-Service -Name "Tailscale"  -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 5

          $savePath = "C:\server-data\ts-state"
          if (-not (Test-Path $savePath)) { New-Item -ItemType Directory -Force -Path $savePath }

          Copy-Item -Path "C:\ProgramData\Tailscale\*" -Destination $savePath -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Tailscale durumu kaydedildi."

      - name: Yedegi Yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-backup
          path: C:\server-data
          retention-days: 1

      - name: Sonraki Calistirmayi Tetikle
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          Write-Host "Is akisi yeniden tetikleniyor..."
          gh workflow run RDP
